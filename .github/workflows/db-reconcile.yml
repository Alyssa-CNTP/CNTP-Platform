name: DB Reconcile (one-time)

# One-time job to align PRODUCTION to STAGING (source of truth).
# Isolated on its own trigger branches so it never runs from main/staging.
#
#   push to `reconcile/diff`   -> back up BOTH dbs to the VPS, then print a read-only diff
#   push to `reconcile/apply`  -> back up prod again, then run supabase/reconcile/apply_prod.sql
#                                 (only if that file AND supabase/reconcile/CONFIRMED exist)
#
# Required GitHub repo secrets — use the **Session Pooler** URIs (GitHub runners are
# IPv4-only; Supabase "Direct connection" is IPv6-only without an add-on):
#   STAGING_DB_URL      postgresql://postgres.qjqkpockmujecjgmdple:PW@aws-0-<region>.pooler.supabase.com:5432/postgres
#   PRODUCTION_DB_URL   postgresql://postgres.sxzjjcyuzyfneesnsjna:PW@aws-0-<region>.pooler.supabase.com:5432/postgres
#   VPS_SSH_KEY         (already set) — used to copy backups to the VPS
#
# Connection strings are never printed; GitHub also masks secret values in logs.

on:
  push:
    branches:
      - reconcile/diff
      - reconcile/apply

concurrency:
  group: db-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postgres 17 client
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # ensure the v17 binaries take precedence over the runner's preinstalled v16
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version

      # ----- BACKUPS (run in both modes, before anything else) -----
      - name: Back up both databases
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
          PROD_DB_URL: ${{ secrets.PRODUCTION_DB_URL }}
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y%m%d_%H%M%S)
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          pg_dump -Fc --no-owner --no-privileges "$PROD_DB_URL"    -f "prod_full_${STAMP}.dump"
          pg_dump -Fc --no-owner --no-privileges "$STAGING_DB_URL" -f "staging_full_${STAMP}.dump"
          ls -lh ./*.dump

      - name: Copy backups to VPS (/home/cntpdev/apps/backups)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 154.65.97.200
          username: cntpdev
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2022
          source: "*.dump"
          target: "/home/cntpdev/apps/backups"

      # ----- DIFF (reconcile/diff only) -----
      - name: Diff staging vs production (read-only)
        if: github.ref_name == 'reconcile/diff'
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
          PROD_DB_URL: ${{ secrets.PRODUCTION_DB_URL }}
        run: |
          set -euo pipefail
          mkdir -p reconcile_out
          # all non-system schemas, with table count + approx total rows
          CEN="SELECT n.nspname AS schema,
                      count(*) FILTER (WHERE c.relkind='r') AS tables,
                      COALESCE(sum(s.n_live_tup),0) AS approx_rows
               FROM pg_namespace n
               LEFT JOIN pg_class c ON c.relnamespace=n.oid AND c.relkind='r'
               LEFT JOIN pg_stat_user_tables s ON s.relid=c.oid
               WHERE n.nspname NOT IN ('pg_catalog','information_schema','pg_toast',
                     'auth','storage','realtime','vault','extensions','graphql','graphql_public',
                     'supabase_functions','supabase_migrations','net','pgbouncer','cron','_realtime')
                 AND n.nspname NOT LIKE 'pg_%'
               GROUP BY 1 ORDER BY 1;"
          # every app table across all schemas
          Q="SELECT n.nspname AS schema, c.relname AS table,
                    COALESCE(s.n_live_tup,0) AS rows
             FROM pg_class c
             JOIN pg_namespace n ON n.oid = c.relnamespace
             LEFT JOIN pg_stat_user_tables s ON s.relid = c.oid
             WHERE c.relkind='r'
               AND n.nspname NOT IN ('pg_catalog','information_schema','pg_toast',
                   'auth','storage','realtime','vault','extensions','graphql','graphql_public',
                   'supabase_functions','supabase_migrations','net','pgbouncer','cron','_realtime')
               AND n.nspname NOT LIKE 'pg_%'
             ORDER BY 1,2;"
          {
            echo "################# SCHEMA CENSUS — STAGING #################"
            psql "$STAGING_DB_URL" -P pager=off -c "$CEN"
            echo "################# SCHEMA CENSUS — PRODUCTION #############"
            psql "$PROD_DB_URL" -P pager=off -c "$CEN"
            echo "################# ALL TABLES — STAGING ###################"
            psql "$STAGING_DB_URL" -P pager=off -c "$Q"
            echo "################# ALL TABLES — PRODUCTION ################"
            psql "$PROD_DB_URL" -P pager=off -c "$Q"
            echo "################# auth.users counts ######################"
            echo -n "staging users: "; psql "$STAGING_DB_URL" -t -A -c "SELECT count(*) FROM auth.users;"
            echo -n "prod users:    "; psql "$PROD_DB_URL"    -t -A -c "SELECT count(*) FROM auth.users;"
          } | tee reconcile_out/diff.txt

      - name: Dump full schema DDL + user-reference report (read-only)
        if: github.ref_name == 'reconcile/diff'
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
          PROD_DB_URL: ${{ secrets.PRODUCTION_DB_URL }}
        run: |
          set -euo pipefail
          mkdir -p reconcile_out
          # canonical target structure (all app schemas) + current prod structure.
          # Exclude only Supabase-managed schemas so this works regardless of which app schemas exist.
          EXC="-N auth -N storage -N realtime -N vault -N extensions -N graphql -N graphql_public -N supabase_functions -N supabase_migrations -N net -N pgbouncer -N cron -N _realtime -N pg_*"
          pg_dump --schema-only --no-owner --no-privileges $EXC "$STAGING_DB_URL" -f reconcile_out/staging_schema.sql
          pg_dump --schema-only --no-owner --no-privileges $EXC "$PROD_DB_URL"    -f reconcile_out/prod_schema.sql
          # every column across all app schemas (for table -> table column mapping)
          COLQ="SELECT table_schema, table_name, ordinal_position AS pos, column_name, data_type, is_nullable
                FROM information_schema.columns
                WHERE table_schema NOT IN ('pg_catalog','information_schema','auth','storage','realtime','vault','extensions','graphql','graphql_public','supabase_functions','supabase_migrations','net','pgbouncer','cron','_realtime')
                  AND table_schema NOT LIKE 'pg_%'
                ORDER BY 1,2,3;"
          psql "$STAGING_DB_URL" -P pager=off -o reconcile_out/staging_columns.txt -c "$COLQ"
          psql "$PROD_DB_URL"    -P pager=off -o reconcile_out/prod_columns.txt    -c "$COLQ"
          # --- qms module (Phase 1 source artifacts) ---
          # canonical structure: staging qms schema only (DDL) — used to rebuild prod's qms
          pg_dump --schema-only --no-owner --no-privileges -n qms "$STAGING_DB_URL" -f reconcile_out/staging_qms_schema.sql
          # authoritative data: staging qms (clean copy to load into prod)
          pg_dump --data-only   --no-owner --no-privileges -n qms "$STAGING_DB_URL" -f reconcile_out/staging_qms_data.sql
          # prod's OLD quality data (public design) + partial qms — for the ETL/merge design
          pg_dump --schema-only --no-owner --no-privileges -n public -n qms "$PROD_DB_URL" -f reconcile_out/prod_public_qms_schema.sql
          # FK constraints that reference any *users* table, in prod
          psql "$PROD_DB_URL" -P pager=off -o reconcile_out/prod_user_fks.txt -c "
            SELECT conrelid::regclass AS child_table, conname,
                   confrelid::regclass AS references_table,
                   pg_get_constraintdef(oid) AS definition
            FROM pg_constraint
            WHERE contype='f' AND confrelid::regclass::text ~ 'users'
            ORDER BY 1;"
          # uuid columns in prod that look like user references (may have no FK)
          psql "$PROD_DB_URL" -P pager=off -o reconcile_out/prod_user_like_cols.txt -c "
            SELECT table_schema, table_name, column_name, data_type
            FROM information_schema.columns
            WHERE table_schema IN ('public','qms')
              AND (column_name ~ '(user|_by|owner|created_by|updated_by|operator)')
            ORDER BY 1,2,3;"
          ls -lh reconcile_out

      - name: Upload analysis report
        if: github.ref_name == 'reconcile/diff'
        uses: actions/upload-artifact@v4
        with:
          name: reconcile-diff
          path: reconcile_out/
          retention-days: 14

      # ----- APPLY (reconcile/apply only, double-gated) -----
      - name: Guard — require confirmed apply script
        if: github.ref_name == 'reconcile/apply'
        run: |
          test -f supabase/reconcile/CONFIRMED || { echo "::error::supabase/reconcile/CONFIRMED missing — refusing to apply"; exit 1; }
          test -f supabase/reconcile/apply_prod.sql || { echo "::error::supabase/reconcile/apply_prod.sql missing"; exit 1; }

      - name: Apply reconciliation to PRODUCTION
        if: github.ref_name == 'reconcile/apply'
        env:
          PROD_DB_URL: ${{ secrets.PRODUCTION_DB_URL }}
        run: |
          set -euo pipefail
          psql "$PROD_DB_URL" -v ON_ERROR_STOP=1 -f supabase/reconcile/apply_prod.sql

      - name: Verify production structure
        if: github.ref_name == 'reconcile/apply'
        env:
          PROD_DB_URL: ${{ secrets.PRODUCTION_DB_URL }}
        run: |
          psql "$PROD_DB_URL" -P pager=off -c "
            SELECT n.nspname AS schema, count(*) AS tables
            FROM pg_class c JOIN pg_namespace n ON n.oid=c.relnamespace
            WHERE c.relkind='r' AND n.nspname IN ('public','qms','acumatica')
            GROUP BY 1 ORDER BY 1;"
