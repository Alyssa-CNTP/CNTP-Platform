name: Deploy to Production

# Mirror of deploy-staging.yml, for production:
#   push to `main`  ->  Production VPS  ->  cntp-production (port 3001)  ->  Production DB
# (staging: push to `staging` -> Staging VPS -> cntp-staging (3000) -> Staging DB)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 154.65.97.200
          username: cntpdev
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2022
          script: |
            export NVM_DIR="$HOME/.nvm" && source "$NVM_DIR/nvm.sh"
            cd /home/cntpdev/apps/production/app/cntp-ops
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            npm install --legacy-peer-deps 2>&1 | tail -5
            npm run build 2>&1 | tail -20
            PORT=3001 /home/cntpdev/.nvm/versions/node/v24.16.0/bin/pm2 restart cntp-production --update-env
            echo "✅ Production deployed successfully"
