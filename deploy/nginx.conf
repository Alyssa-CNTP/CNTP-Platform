# ─────────────────────────────────────────────────────────────────────────────
# Alara — nginx reverse proxy configuration
# Place at: /etc/nginx/sites-available/alara
# Symlink:  sudo ln -s /etc/nginx/sites-available/alara /etc/nginx/sites-enabled/
#
# Serves:
#   yourdomain.com       → Next.js app (PM2, port 3000)
#   n8n.yourdomain.com   → n8n Docker container (port 5678)
#
# SSL: managed by Certbot. Run this first:
#   sudo certbot --nginx -d yourdomain.com -d n8n.yourdomain.com
#
# REPLACE all instances of "yourdomain.com" before use.
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=ingest:10m rate=120r/m;

# ── Upstream definitions ───────────────────────────────────────────────────────
upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream n8n_app {
    server 127.0.0.1:5678;
    keepalive 8;
}

# ══════════════════════════════════════════════════════════════════════════════
# HTTP → HTTPS redirect (Certbot manages the 443 block below)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com n8n.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ══════════════════════════════════════════════════════════════════════════════
# Main app — yourdomain.com
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (Certbot fills these in) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size 55M;     # vault upload max (50MB file + overhead)

    # ── Next.js static assets — cache aggressively ────────────────────────────
    location /_next/static/ {
        alias /home/deploy/cntp-ops/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /public/ {
        alias /home/deploy/cntp-ops/public/;
        expires 7d;
        access_log off;
    }

    # ── API: ingest — higher rate limit for n8n POSTs ─────────────────────────
    location /api/ingest {
        limit_req zone=ingest burst=20 nodelay;
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 30s;
    }

    # ── API: Gemini-backed routes — slightly rate-limited ────────────────────
    location /api/sales {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 65s;    # matches maxDuration=60 + buffer
    }

    location /api/vault {
        limit_req zone=api burst=5 nodelay;
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 65s;
        client_max_body_size 55M;
    }

    # ── Everything else → Next.js ─────────────────────────────────────────────
    location / {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# n8n — n8n.yourdomain.com
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name n8n.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff"    always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 16M;

    # n8n needs WebSocket support for its editor
    location / {
        proxy_pass         http://n8n_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;   # long for workflow execution
        proxy_send_timeout 3600s;
    }
}
