# Live nginx config for production — /etc/nginx/sites-available/cntpplatform
# (symlinked into /etc/nginx/sites-enabled/). Reverse-proxies the domain to the
# cntp-production Node app on :3001. Applied 2026-06-22 via cntp_nginx_go_live.sh.
# SSL is Let's Encrypt (Certbot). Mirrors the staging site (which proxies :3000).

server {
    listen 80;
    server_name cntpplatform.rooibostea.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cntpplatform.rooibostea.co.za;

    ssl_certificate /etc/letsencrypt/live/cntpplatform.rooibostea.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cntpplatform.rooibostea.co.za/privkey.pem;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
